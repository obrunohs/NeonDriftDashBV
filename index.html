<style>
body{
    margin:0;
    overflow:hidden;
    background:black;
    font-family:Arial;
    color:white;
}

/* CANVAS */
canvas{
    display:block;
}

/* MENU CENTRAL */
#menu{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    text-align:center;
    width:90%;
}

/* TÍTULO */
#menu h1{
    font-size:8vw;
    margin-bottom:10px;
}

/* TEXTO */
#menu p{
    font-size:4vw;
}

/* BOTÕES GRANDES MOBILE */
button{
    width:80%;
    max-width:300px;
    padding:15px;
    font-size:5vw;
    margin-top:15px;
    border:none;
    border-radius:12px;
    background:#00ffff;
    color:black;
}

/* SKINS GRID */
#skins{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
}

/* SKINS MAIORES */
.skin-box{
    width:60px;
    height:60px;
    margin:8px;
    border:3px solid white;
}

.skin-selected{
    border:4px solid yellow;
}

.lock-text{
    font-size:10px;
}

/* INDICADOR SKIN */
#skinIndicator{
    position:absolute;
    top:10px;
    left:50%;
    transform:translateX(-50%);
    width:50px;
    height:50px;
}

#skinIndicatorInner{
    width:40px;
    height:40px;
}

/* BOTÃO DE PULO */
#btnJump{
    position: fixed;
    bottom: 25px;
    right: 25px;
    width: 90px;
    height: 90px;
    font-size: 35px;
    border-radius: 50%;
    background: rgba(0,255,255,0.8);
    border: none;
    color: black;
    z-index: 999;
}

/* GAME OVER */
#gameoverMenu{
    width:90%;
}

#gameoverMenu h1{
    font-size:8vw;
}

</style>
